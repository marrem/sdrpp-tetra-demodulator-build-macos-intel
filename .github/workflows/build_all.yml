name: Build Module
on: push

env:
  BUILD_TYPE: Debug
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build_macos_intel:
    runs-on: macos-13
    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install talloc glfw glew volk fftw

      - name: Get SDR++ master source
        run: |
          wget https://github.com/AlexandreRouma/SDRPlusPlus/archive/refs/heads/master.tar.gz
          tar -zxvf master.tar.gz

      - name: Get SDR++ nightly lib
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          repo: 'AlexandreRouma/SDRPlusPlus'
          version: 'tags/nightly'
          file: 'sdrpp_macos_intel.zip'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Unpack SDR++ lib
        run: unzip sdrpp_macos_intel.zip

      - name: Download ETSI codec
        run: |
          cd src/decoder/etsi_codec-patches
          sed 's/md5sum/md5 -r/' download_and_patch.sh > download_and_patch_mac.sh
          chmod +x download_and_patch_mac.sh
          ./download_and_patch_mac.sh

      - name: Cmake
        run: |
          mkdir build
          cd build
          cmake .. \
            -DSDRPP_MODULE_CMAKE="$GITHUB_WORKSPACE/.github/workflows/sdrpp_module_macos.cmake" \
            -DSDRPP_CORE_ROOT="$GITHUB_WORKSPACE/SDRPlusPlus-master/core/src" \
            -DSDRPP_LIB_ROOT="$GITHUB_WORKSPACE/SDRPlusPlus-master/core/src" \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Make
        run: |
          cd build
          make -j"$(sysctl -n hw.ncpu)"

      - name: Upload library
        uses: actions/upload-artifact@v4
        with:
          name: tetra_demodulator_macos_intel
          path: ./build/tetra_demodulator.dylib
